services:
  db:
    image: postgres
    volumes:
      - ./tmp/db:/var/postgresql/data
    environment:
      POSTGRES_PASSWORD: password
  
  redis:
    image: 'redis:5-alpine'
    command: redis-server
    ports:
      - '6379:6379'

  sidekiq:
    depends_on:
      - 'redis'
    build: .
    command: bundle exec sidekiq
    volumes:
      - '.:/project'
      - '/project/tmp' # don't mount tmp directory
    env_file:
    - .env

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && rails server -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/chatbottg
    ports:
      - "3000:3000"
    depends_on:
      - db
      - sidekiq
    env_file:
      - .env